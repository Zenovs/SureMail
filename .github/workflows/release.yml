name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libarchive-tools \
            squashfs-tools \
            fakeroot \
            rpm \
            dpkg

      - name: Install dependencies
        run: npm ci

      - name: Build React
        run: npm run react-build
        env:
          CI: false

      - name: Build Electron AppImage (x64 + arm64)
        run: ./node_modules/.bin/electron-builder --linux appimage --x64 --arm64 --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List dist folder
        run: ls -la dist/

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: CoreMail Desktop v${{ steps.version.outputs.VERSION }}
          body: |
            ## CoreMail Desktop v${{ steps.version.outputs.VERSION }}

            ### Installation / Update

            Das Script erkennt die Architektur automatisch (x64 / arm64):

            ```bash
            bash <(curl -s https://raw.githubusercontent.com/Zenovs/coremail/initial-code/install.sh)
            ```

            ### Downloads

            | Architektur | Datei |
            |---|---|
            | x64 (Standard-PC) | `CoreMail-Desktop-${{ steps.version.outputs.VERSION }}-x64.AppImage` |
            | arm64 (Raspberry Pi 4/5) | `CoreMail-Desktop-${{ steps.version.outputs.VERSION }}-arm64.AppImage` |

            ### Änderungen
            Siehe [Commit-History](https://github.com/Zenovs/coremail/commits/initial-code)
          files: dist/*.AppImage
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
