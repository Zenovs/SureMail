<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="minGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0A0F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A1A24;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="200" height="200" rx="24" fill="url(#minGrad)"/>

  <!-- Abstract C-shape composition -->
  <g transform="translate(100, 100)">

    <!-- Large arc - abstract "C" for Core -->
    <path d="M 40 -55 A 65 65 0 1 0 40 55" fill="none" stroke="#06B6D4" stroke-width="4" stroke-linecap="round"/>

    <!-- Inner arc - parallel -->
    <path d="M 32 -45 A 53 53 0 1 0 32 45" fill="none" stroke="#22D3EE" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>

    <!-- Abstract arrow/triangle pointing into the C - mail direction -->
    <path d="M -50 -8 L -25 0 L -50 8 Z" fill="#06B6D4"/>

    <!-- Minimal dots - data points -->
    <circle cx="-35" cy="0" r="2.5" fill="#22D3EE"/>
    <circle cx="-20" cy="0" r="2.5" fill="#22D3EE"/>
    <circle cx="-5" cy="0" r="2.5" fill="#22D3EE"/>

    <!-- Accent line through center -->
    <line x1="-60" y1="0" x2="10" y2="0" stroke="#164E63" stroke-width="1" opacity="0.4"/>

  </g>

</svg>
