<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Main gradient for envelope body -->
    <linearGradient id="envelopeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    
    <!-- Cyan gradient for accents -->
    <linearGradient id="cyanGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="50%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
    
    <!-- Glow effect -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Inner shadow -->
    <filter id="innerShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feComponentTransfer in="SourceAlpha">
        <feFuncA type="table" tableValues="1 0"/>
      </feComponentTransfer>
      <feGaussianBlur stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feFlood flood-color="rgba(0,0,0,0.5)"/>
      <feComposite in2="offsetblur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Drop shadow for the icon -->
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="rgba(0,0,0,0.4)"/>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#envelopeGradient)" filter="url(#dropShadow)"/>
  
  <!-- Outer ring accent -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="url(#cyanGradient)" stroke-width="3" opacity="0.6"/>
  
  <!-- Envelope body -->
  <g transform="translate(256, 256)">
    <!-- Envelope base -->
    <rect x="-140" y="-80" width="280" height="180" rx="16" ry="16" 
          fill="#1e2630" stroke="url(#cyanGradient)" stroke-width="2"/>
    
    <!-- Envelope flap (triangular top) -->
    <path d="M-140,-80 L0,40 L140,-80 Z" 
          fill="#252d38" stroke="url(#cyanGradient)" stroke-width="2" stroke-linejoin="round"/>
    
    <!-- Inner envelope shadow -->
    <path d="M-140,-80 L0,40 L140,-80 L140,100 L-140,100 Z" 
          fill="none" stroke="#0891b2" stroke-width="1" opacity="0.3"/>
    
    <!-- "C" lettermark in the center -->
    <g filter="url(#glow)">
      <path d="M25,-5 
               C25,-40 0,-55 -30,-55 
               C-65,-55 -85,-30 -85,5 
               C-85,40 -65,65 -30,65 
               C0,65 25,50 25,15"
            fill="none" 
            stroke="url(#cyanGradient)" 
            stroke-width="18" 
            stroke-linecap="round"
            transform="translate(5, -5)"/>
    </g>
    
    <!-- Decorative dots -->
    <circle cx="-100" cy="70" r="6" fill="#22d3ee" opacity="0.6"/>
    <circle cx="100" cy="70" r="6" fill="#22d3ee" opacity="0.6"/>
  </g>
  
  <!-- Notification badge -->
  <circle cx="400" cy="120" r="50" fill="#06b6d4" filter="url(#dropShadow)"/>
  <circle cx="400" cy="120" r="46" fill="url(#cyanGradient)"/>
  
  <!-- Checkmark in badge -->
  <path d="M375,120 L390,135 L425,100" 
        fill="none" 
        stroke="white" 
        stroke-width="10" 
        stroke-linecap="round" 
        stroke-linejoin="round"/>
</svg>
