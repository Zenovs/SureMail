<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Konzept 1: Minimalistischer Brief mit @ -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Hintergrund: Abgerundetes Quadrat -->
  <rect x="32" y="32" width="448" height="448" rx="80" ry="80" fill="#0f172a"/>
  
  <!-- Brief-Umschlag: Nur Linien, kein Füller -->
  <g fill="none" stroke="url(#grad1)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round">
    <!-- Umschlag-Körper -->
    <rect x="96" y="160" width="320" height="220" rx="16"/>
    
    <!-- Umschlag-Klappe (V-Form) -->
    <path d="M96 176 L256 300 L416 176"/>
  </g>
  
  <!-- Kleiner Punkt als Akzent -->
  <circle cx="256" cy="300" r="12" fill="#06b6d4"/>
</svg>
