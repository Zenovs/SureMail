<svg xmlns="https://placehold.co/1200x600/e2e8f0/1e293b?text=An_SVG_graphic_depicting_three_concepts_side_by_si" viewBox="0 0 1600 600">
  <!-- 3 Konzepte nebeneinander -->
  
  <!-- ========== KONZEPT 1: Geometrischer Brief ========== -->
  <g transform="translate(50, 50)">
    <text x="200" y="-10" font-family="sans-serif" font-size="20" fill="#666" text-anchor="middle">Konzept 1: Geometrisch</text>
    <rect x="0" y="0" width="400" height="400" rx="60" fill="#0f172a"/>
    
    <g fill="none" stroke="#06b6d4" stroke-width="14" stroke-linecap="round" stroke-linejoin="round">
      <rect x="70" y="120" width="260" height="180" rx="12"/>
      <path d="M70 136 L200 220 L330 136"/>
    </g>
    <circle cx="200" cy="220" r="10" fill="#06b6d4"/>
  </g>
  
  <!-- ========== KONZEPT 2: @ mit Umschlag ========== -->
  <g transform="translate(550, 50)">
    <text x="200" y="-10" font-family="sans-serif" font-size="20" fill="#666" text-anchor="middle">Konzept 2: @ Symbol</text>
    <rect x="0" y="0" width="400" height="400" rx="60" fill="#0f172a"/>
    
    <!-- @ Symbol groß -->
    <text x="200" y="270" font-family="system-ui, -apple-system, sans-serif" font-size="200" font-weight="300" fill="none" stroke="#06b6d4" stroke-width="8" text-anchor="middle">@</text>
  </g>
  
  <!-- ========== KONZEPT 3: C + Umschlag kombiniert ========== -->
  <g transform="translate(1050, 50)">
    <text x="200" y="-10" font-family="sans-serif" font-size="20" fill="#666" text-anchor="middle">Konzept 3: "C" + Brief</text>
    <rect x="0" y="0" width="400" height="400" rx="60" fill="#0f172a"/>
    
    <!-- C als Hauptelement -->
    <path d="M260 120 
             C 140 120, 100 200, 100 200 
             C 100 200, 100 280, 220 280
             L 220 280"
          fill="none" stroke="#06b6d4" stroke-width="24" stroke-linecap="round"/>
    
    <!-- Brief-Element als Akzent -->
    <g fill="none" stroke="#06b6d4" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" opacity="0.7">
      <rect x="220" y="200" width="100" height="70" rx="6"/>
      <path d="M220 208 L270 245 L320 208"/>
    </g>
  </g>
  
  <!-- Legende -->
  <text x="800" y="520" font-family="sans-serif" font-size="18" fill="#888" text-anchor="middle">
    Alle Konzepte: Dunkler Hintergrund (#0f172a), Cyan-Akzent (#06b6d4), minimale Linien
  </text>
  <text x="800" y="550" font-family="sans-serif" font-size="16" fill="#666" text-anchor="middle">
    Welches Konzept gefällt dir am besten? Ich kann es dann als PNG in allen Größen generieren.
  </text>
</svg>
