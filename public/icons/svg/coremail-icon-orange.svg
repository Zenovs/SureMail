<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="gradOrange" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:1" />
    </linearGradient>
    <filter id="shadowOrange" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Umschlag Körper -->
  <rect x="64" y="128" width="384" height="256" rx="24" ry="24" fill="url(#gradOrange)" filter="url(#shadowOrange)"/>
  
  <!-- Umschlag Klappe -->
  <path d="M 64 152 L 256 280 L 448 152" stroke="rgba(255,255,255,0.4)" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Innere Linien -->
  <path d="M 64 384 L 200 280" stroke="rgba(255,255,255,0.2)" stroke-width="2" fill="none"/>
  <path d="M 448 384 L 312 280" stroke="rgba(255,255,255,0.2)" stroke-width="2" fill="none"/>
  
  <!-- "C" Buchstabe -->
  <text x="256" y="310" font-family="Arial, Helvetica, sans-serif" font-size="160" font-weight="bold" fill="#ffffff" text-anchor="middle" dominant-baseline="middle">C</text>
</svg>