<svg xmlns="https://static.vecteezy.com/system/resources/previews/024/051/274/non_2x/scalable-business-blue-gradient-concept-icon-easy-to-provide-work-affiliate-marketer-benefit-abstract-idea-thin-line-illustration-isolated-outline-drawing-vector.jpg" viewBox="0 0 512 512">
