  <path d="M 448 384 L 312 280" stroke="rgba(255,255,255,0.2)" stroke-width="2" fill="none"/>
  
  <!-- "C" Buchstabe -->
  <text x="256" y="310" font-family="Arial, Helvetica, sans-serif" font-size="160" font-weight="bold" fill="#ffffff" text-anchor="middle" dominant-baseline="middle">C</text>
