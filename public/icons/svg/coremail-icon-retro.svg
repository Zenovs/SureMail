<svg xmlns="https://placehold.co/1200x600/e2e8f0/1e293b?text=SVG_graphic_with_a_linear_gradient_transitioning_f" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="gradRetro" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff00ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00ffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff00ff;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadowRetro" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#ff00ff" flood-opacity="0.5"/>
    </filter>
  </defs>
  
  <!-- Hintergrund für Synthwave-Effekt -->
  <rect x="64" y="128" width="384" height="256" rx="24" ry="24" fill="#1a0a2e" filter="url(#shadowRetro)"/>
  
  <!-- Neon Umschlag Rand -->
  <rect x="64" y="128" width="384" height="256" rx="24" ry="24" fill="none" stroke="url(#gradRetro)" stroke-width="4" filter="url(#glow)"/>
  
  <!-- Umschlag Klappe - Neon -->
  <path d="M 64 152 L 256 280 L 448 152" stroke="#00ffff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  
  <!-- Innere Linien - Neon -->
  <path d="M 64 384 L 200 280" stroke="#ff00ff" stroke-width="2" fill="none" opacity="0.7"/>
  <path d="M 448 384 L 312 280" stroke="#ff00ff" stroke-width="2" fill="none" opacity="0.7"/>
  
  <!-- "C" Buchstabe mit Neon-Effekt -->
  <text x="256" y="310" font-family="Arial, Helvetica, sans-serif" font-size="160" font-weight="bold" fill="#00ffff" text-anchor="middle" dominant-baseline="middle" filter="url(#glow)">C</text>
</svg>